services:
  gsh-backend:
    image: ghcr.io/trickdaddy24/gsh-v2-deploy/backend:latest
    container_name: gsh-backend
    restart: unless-stopped
    env_file: web/backend/.env
    volumes:
      - gsh_data:/data
    environment:
      - DB_PATH=/data/OnDemand_subscriptions.db
      - ADMIN_PASSWORD_HASH=$$2b$$12$$jji7Esc/elyNh8ivtpEdROG65uyKl7ZJ8TUcKlgeapsu2GMF/upTW
    networks:
      - gsh

  gsh-frontend:
    image: ghcr.io/trickdaddy24/gsh-v2-deploy/frontend:latest
    container_name: gsh-frontend
    restart: unless-stopped
    depends_on:
      - gsh-backend
    networks:
      - saltbox
      - gsh
    labels:
      traefik.enable: "true"
      traefik.http.routers.gsh.rule: "Host(`gsh.stunna.xyz`)"
      traefik.http.routers.gsh.entrypoints: "websecure"
      traefik.http.routers.gsh.tls.certresolver: "cfdns"
      traefik.http.services.gsh.loadbalancer.server.port: "80"
      traefik.docker.network: "saltbox"

volumes:
  gsh_data:

networks:
  saltbox:
    external: true
  gsh:
